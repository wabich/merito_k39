<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listy</title>
  <link rel="stylesheet" href="./1_style.css">
</head>
<body>
  <h4>Lista numerowana</h4>
  <section id="daily-schedule">
  <h2>Plan dnia</h2>
  <ol>
    <li>Śniadanie</li>
    <li>Szkoła</li>
    <li>Sport</li>
  </ol>
  </section>
  <section id="shopping list">
    <h2>Lista zakupów</h2>
    <ul>
      <li>Owoce</li>
        <ol>
          <li>Jabłka</li>
          <li>Banany</li>
          <li>Kiwi</li>
        </ol>
      <li>Warzywa</li>
        <ol type="a">
          <li>Marchew</li>
          <li>Cebula</li>
        </ol>
    </ul>
  </section>

  <!-- Lista definicji -->
   <section id="glossary">
      <dl>
        <dt>HTML</dt>
        <dd>Język znaczników</dd>
        <dt>CSS</dt>
        <dd>Język stylów</dd>
      </dl>
   </section>
   <h2>Lista nienumerowana z obrazkami</h2>
   <ul id="myImage">
      <li>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/Wikipedia-logo-v2.svg/250px-Wikipedia-logo-v2.svg.png" alt="Logo wikipedii">
      </li>
   </ul>
  
</body>
</html>
