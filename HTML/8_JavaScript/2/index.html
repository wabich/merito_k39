<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funkcje</title>
</head>
<body>
    <script>
        function f(){
            console.log("test");
        }
        
        function greet(name){
            return "Witaj " + name + "!";
        }

        function calculateSum(a, b){
            return a + b;
        }

        const sum = (a, b) => {
            return a + b;
        }


        f();

        console.log(greet("Janusz"));

        console.log(calculateSum(2, 5));

        console.log(sum(4, 6));

        //1. Napisz funkcję strzałkową o nazwie calculateCubeArea
        //2. Funkcja ma przyjmować jeden parametr: a (długość krawędzi sześcianu)
        //3. Funkcja ma zwracać pole całkowite sześcianu
        //wzór: p = 6 * a * a

        const calculateCubeArea = a => 6 * a * a;

        console.log(calculateCubeArea(3))

    </script>
</body>
</html>
