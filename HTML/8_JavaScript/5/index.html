<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeliczanie temperatury</title>
</head>
<body>
    <div class="container">
        <h2>Fahrenheit -> Celsjusz</h2>
        <form>
            Podaj temperaturę w °F:<br>
            <input type="number" id="fahrenheit" oninput="convertTemperature()"><br>
            <!-- <button type="button" onclick="convertTemperature()">Przelicz</button> -->
        </form>
        <p id="result"></p>
    </div>
    <script>
        function convertTemperature(){
            let fahrenheitValue = document.getElementById("fahrenheit").value;
            let calsiusValue = (fahrenheitValue - 32) * 5 / 9;

            document.getElementById("result").innerHTML = "Temperatura w °C: " + calsiusValue.toFixed(2);
            
        }
    </script>
</body>
</html>
